<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1200"/>
<title>JOBLY</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{--bg:#0a0e27;--card:#111835;--muted:#8b93a1;--accent:#6366f1;--border:#1e2749;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--info:#3b82f6}
*{box-sizing:border-box;font-family:'Inter',system-ui,-apple-system;transition:all 0.2s ease}
body{margin:0;background:linear-gradient(135deg, var(--bg) 0%, #0f1729 100%);color:#fff;min-height:100vh}
  body{
   min-width:1200px;
  }

/* HEADER */
header{display:flex;justify-content:space-between;align-items:center;padding:20px 40px;background:rgba(17,24,53,0.8);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,0.3)}
header h1{margin:0;font-size:28px;background:linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* BUTTONS */
button{background:linear-gradient(135deg, var(--accent) 0%, #7c3aed 100%);border:none;color:#fff;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;box-shadow:0 2px 8px rgba(99,102,241,0.2);transition:all 0.3s ease}
button:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(99,102,241,0.4)}
button:active{transform:translateY(0)}
button.secondary{background:#374151;box-shadow:0 2px 8px rgba(55,65,81,0.2)}
button.loading{opacity:0.7;cursor:not-allowed;position:relative}
button.loading::after{content:'';display:inline-block;width:12px;height:12px;border:2px solid #fff;border-top:2px solid transparent;border-radius:50%;animation:spin 1s linear infinite;margin-left:8px}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

/* AUTH */
.auth-card{background:rgba(17,24,53,0.9);backdrop-filter:blur(10px);padding:40px;border-radius:16px;width:380px;border:1px solid var(--border);box-shadow:0 10px 40px rgba(0,0,0,0.4)}
.auth-card h2{text-align:center;margin-top:0;color:#fff;font-size:24px}
.input-group{margin:15px 0;position:relative}
.input-group input{width:100%;padding:12px 14px;border-radius:8px;border:1px solid var(--border);background:rgba(15,17,41,0.5);color:#fff;font-size:14px;transition:all 0.3s ease}
.input-group input:focus{outline:none;border-color:var(--accent);background:rgba(15,17,41,0.8);box-shadow:0 0 0 3px rgba(99,102,241,0.1)}
.input-group input::placeholder{color:var(--muted)}
.eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:16px;opacity:0.7;transition:opacity 0.3s}
.eye:hover{opacity:1}
.auth-error{background:rgba(239,68,68,0.15);padding:12px;border-radius:8px;margin-top:10px;font-size:13px;color:#fca5a5;border-left:3px solid #ef4444}

/* TABLE */
.container{max-width:1200px;margin:auto;padding:40px}
.table-header{display:flex;padding:16px 20px;font-size:12px;color:var(--muted);border-bottom:2px solid var(--border);font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.cards{display:flex;flex-direction:column;gap:10px}
.card{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border:1px solid var(--border);border-radius:10px;background:rgba(17,24,53,0.6);backdrop-filter:blur(5px);transition:all 0.3s ease;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(180deg, var(--accent), transparent);opacity:0;transition:opacity 0.3s}
.card:hover{background:rgba(17,24,53,0.9);border-color:var(--accent);box-shadow:0 6px 24px rgba(99,102,241,0.15);transform:translateX(2px)}
.card:hover::before{opacity:1}
.col-company{width:200px;font-weight:700;color:#e0e7ff;font-size:15px}
.col-role{width:170px;color:#cbd5f5;font-weight:500}
.col-status{width:130px}
.col-date{width:150px;color:#cbd5f5;font-size:13px}
.col-location{width:130px;color:#cbd5f5;font-size:13px}
.col-salary{width:110px;color:#a5f3fc;font-weight:600;font-size:13px}
.col-actions{width:180px;display:flex;gap:6px}
.card select{appearance:none;background-image:url('data:image/svg+xml;utf8,<svg fill="%2360a5fa" height="12" viewBox="0 0 24 24" width="12" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>');background-repeat:no-repeat;background-position:right 5px center;padding-right:20px;cursor:pointer;font-size:12px;border-radius:8px;padding:4px 8px;transition:all 0.3s ease;border:1px solid var(--border);background:rgba(15,17,41,0.7);color:#fff}
.card select:hover{background:rgba(15,17,41,0.9);border-color:var(--accent)}
.card select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(99,102,241,0.2)}

/* LOADING INDICATOR */
.loader{display:inline-block;width:16px;height:16px;border:3px solid rgba(99,102,241,0.3);border-top:3px solid var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* STATUS COLORS */
.status-applied{color:#60a5fa;font-weight:600}
.status-phone-screen{color:#8b5cf6;font-weight:600}
.status-interview-scheduled{color:#f59e0b;font-weight:600}
.status-interviewed{color:#f59e0b;font-weight:600}
.status-technical-test{color:#d97706;font-weight:600}
.status-offer-received{color:#10b981;font-weight:600}
.status-offer-accepted{color:#059669;font-weight:600}
.status-rejected{color:#ef4444;font-weight:600}
.status-withdrawn{color:#6b7280;font-weight:600}

/* FILTERS */
.filters{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;animation:fadeInUp 0.4s ease}
.filters input, .filters select{padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:rgba(15,17,41,0.5);color:#fff;font-size:13px;transition:all 0.3s ease}
.filters input:focus, .filters select:focus{outline:none;border-color:var(--accent);background:rgba(15,17,41,0.8);box-shadow:0 0 0 3px rgba(99,102,241,0.1)}
.filters input::placeholder{color:var(--muted)}
.filters select{appearance:none;background-image:url('data:image/svg+xml;utf8,<svg fill="%2360a5fa" height="16" viewBox="0 0 24 24" width="16" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>');background-repeat:no-repeat;background-position:right 10px center;padding-right:35px;cursor:pointer}

/* FORMS */
#addBox, #editBox{display:none;margin-bottom:20px;background:rgba(17,24,53,0.8);padding:20px;border:1px solid var(--border);border-radius:12px;backdrop-filter:blur(5px);animation:fadeInUp 0.3s ease}
#addBox input, #addBox select, #editBox input, #editBox select{width:100%;padding:10px 12px;margin:8px 0;border-radius:8px;border:1px solid var(--border);background:rgba(15,17,41,0.5);color:#fff;font-size:13px;transition:all 0.3s ease}
#addBox input:focus, #addBox select:focus, #editBox input:focus, #editBox select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,0.1)}
#addBox select, #editBox select{appearance:none;background-image:url('data:image/svg+xml;utf8,<svg fill="%2360a5fa" height="16" viewBox="0 0 24 24" width="16" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>');background-repeat:no-repeat;background-position:right 10px center;padding-right:35px;cursor:pointer}
#editBox h3{margin-top:0;color:#e0e7ff;font-size:16px}

input[type="date"]{cursor:pointer;padding:10px 12px !important}
input[type="date"]::-webkit-calendar-picker-indicator{cursor:pointer;filter:invert(0.8);transition:all 0.3s}
input[type="date"]::-webkit-calendar-picker-indicator:hover{filter:invert(1)}

/* FOOTER */
footer{padding:30px;text-align:center;background:rgba(17,24,53,0.8);border-top:1px solid var(--border);color:var(--muted);font-size:13px;margin-top:60px;backdrop-filter:blur(5px)}
footer p{margin:5px 0}
footer a{color:var(--accent);text-decoration:none;transition:all 0.3s}
footer a:hover{color:#7c3aed;text-decoration:underline}
</style>
</head>

<body>
<!-- AUTH -->
<div id="authBox" style="height:100vh;display:flex;align-items:center;justify-content:center">
  <div class="auth-card">
    <h2 id="authTitle">Login</h2>

    <div class="input-group" id="nameGroup" style="display:none">
      <input id="auth_name" placeholder="Full Name">
    </div>

    <div class="input-group">
      <input id="auth_email" placeholder="demouser@gmail.com">
    </div>

    <div class="input-group">
      <input id="auth_password" type="password" placeholder="Demo@123">
      <span class="eye" onclick="togglePassword()">🧐</span>
    </div>

    <div id="authError" class="auth-error" style="display:none"></div>

    <div style="display:flex;gap:8px;margin-top:10px">
      <button id="loginBtn" onclick="login()">Login</button>
      <button id="signupBtn" onclick="signup()">Signup</button>
    </div>

    <p onclick="toggleAuth()" style="cursor:pointer;color:#60a5fa;margin-top:10px">Switch mode</p>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
<header>
  <h1>💼 JOBLY</h1>
  <div style="display:flex;align-items:center;gap:16px">
    <span id="userLabel" style="color:#93c5fd"></span>
    <button class="secondary" onclick="logout()">Logout</button>
  </div>
</header>

<div class="container">

  <div class="filters">
    <input id="searchText" placeholder="Search Anything To Find..." oninput="loadJobs()">
    <button id="todayBtn" class="warning" onclick="toggleFollowupTodayBtn()">📅 Today (OFF)</button>
    <select id="filter" onchange="loadJobs()">
      <option value="">All</option>
      <option value="Applied">📝 Applied</option>
      <option value="Phone Screen">📞 Phone Screen</option>
      <option value="Interview Scheduled">📅 Interview Scheduled</option>
      <option value="Interviewed">👥 Interviewed</option>
      <option value="Technical Test">💻 Technical Test</option>
      <option value="Offer Received">📬 Offer Received</option>
      <option value="Offer Accepted">✅ Offer Accepted</option>
      <option value="Rejected">❌ Rejected</option>
      <option value="Withdrawn">🚪 Withdrawn</option>
    </select>
    <button onclick="toggleAdd()" class="warning">➕ Add</button>
  </div>

  <div id="addBox" style="display:none;margin-bottom:15px;background:rgba(17,24,53,0.8);padding:20px;border:1px solid var(--border);border-radius:12px;backdrop-filter:blur(5px)">
    <h3 style="margin-top:0;color:#fff">Add New Job Application</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px">
      <div>
        <label for="c_company" style="display:block;margin-bottom:5px;color:var(--muted);font-size:12px">Company *</label>
        <input id="c_company" placeholder="e.g. Google" required>
      </div>
      <div>
        <label for="c_role" style="display:block;margin-bottom:5px;color:var(--muted);font-size:12px">Role *</label>
        <input id="c_role" placeholder="e.g. Software Engineer" required>
      </div>
      <div>
        <label for="c_location" style="display:block;margin-bottom:5px;color:var(--muted);font-size:12px">Location</label>
        <input id="c_location" placeholder="e.g. San Francisco, CA">
      </div>
      <div>
        <label for="c_salary" style="display:block;margin-bottom:5px;color:var(--muted);font-size:12px">Salary</label>
        <input id="c_salary" placeholder="e.g. 120000 or Negotiable">
      </div>
      <div style="grid-column:span 2">
        <label for="c_joburl" style="display:block;margin-bottom:5px;color:var(--muted);font-size:12px">Job URL</label>
        <input id="c_joburl" placeholder="https://...">
      </div>
      <div>
        <label for="c_status" style="display:block;margin-bottom:5px;color:var(--muted);font-size:12px">Status</label>
        <select id="c_status">
          <option value="Applied">📝 Applied</option>
          <option value="Phone Screen">📞 Phone Screen</option>
          <option value="Interview Scheduled">📅 Interview Scheduled</option>
          <option value="Interviewed">👥 Interviewed</option>
          <option value="Technical Test">💻 Technical Test</option>
          <option value="Offer Received">📬 Offer Received</option>
          <option value="Offer Accepted">✅ Offer Accepted</option>
          <option value="Rejected">❌ Rejected</option>
          <option value="Withdrawn">🚪 Withdrawn</option>
        </select>
      </div>
      <div>
        <label for="c_follow" style="display:block;margin-bottom:5px;color:var(--muted);font-size:12px">Follow-up Date</label>
        <input id="c_follow" type="date" onclick="this.showPicker()">
      </div>
    </div>
    <button id="addBtn" onclick="createJob()" style="margin-top:15px;width:100%">Save Application</button>
  </div>

  <div id="editBox" style="display:none;margin-bottom:15px;background:rgba(17,24,53,0.8);padding:20px;border:1px solid var(--border);border-radius:12px;backdrop-filter:blur(5px)">
    <h3 style="margin-top:0;color:#fff">Edit Job Application</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px">
      <div>
        <label for="e_company" style="display:block;margin-bottom:5px;color:var(--muted);font-size:12px">Company *</label>
        <input id="e_company" placeholder="e.g. Google" required>
      </div>
      <div>
        <label for="e_role" style="display:block;margin-bottom:5px;color:var(--muted);font-size:12px">Role *</label>
        <input id="e_role" placeholder="e.g. Software Engineer" required>
      </div>
      <div>
        <label for="e_location" style="display:block;margin-bottom:5px;color:var(--muted);font-size:12px">Location</label>
        <input id="e_location" placeholder="e.g. San Francisco, CA">
      </div>
      <div>
        <label for="e_salary" style="display:block;margin-bottom:5px;color:var(--muted);font-size:12px">Salary</label>
        <input id="e_salary" placeholder="e.g. 120000 or Negotiable">
      </div>
      <div style="grid-column:span 2">
        <label for="e_joburl" style="display:block;margin-bottom:5px;color:var(--muted);font-size:12px">Job URL</label>
        <input id="e_joburl" placeholder="https://...">
      </div>
      <div>
        <label for="e_status" style="display:block;margin-bottom:5px;color:var(--muted);font-size:12px">Status</label>
        <select id="e_status">
          <option value="Applied">📝 Applied</option>
          <option value="Phone Screen">📞 Phone Screen</option>
          <option value="Interview Scheduled">📅 Interview Scheduled</option>
          <option value="Interviewed">👥 Interviewed</option>
          <option value="Technical Test">💻 Technical Test</option>
          <option value="Offer Received">📬 Offer Received</option>
          <option value="Offer Accepted">✅ Offer Accepted</option>
          <option value="Rejected">❌ Rejected</option>
          <option value="Withdrawn">🚪 Withdrawn</option>
        </select>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:15px">
      <button id="editBtn" onclick="saveEdit()" style="flex:1">Save Changes</button>
      <button class="secondary" onclick="cancelEdit()" style="flex:1">Cancel</button>
    </div>
  </div>

  <div class="table-header">
    <div class="col-company">Company</div>
    <div class="col-role">Role</div>
    <div class="col-location">Location</div>
    <div class="col-salary">Salary</div>
    <div class="col-status">Status</div>
    <div class="col-date">Follow-up</div>
    <div class="col-actions">Actions</div>
  </div>

  <div id="jobs" class="cards"></div>

</div>

<script>
const API="https://job-tracker-api-4clv.onrender.com";

/* AUTH */
function togglePassword(){
  const p=document.getElementById('auth_password');
  p.type=p.type==='password'?'text':'password';
}
function showError(msg){const e=document.getElementById('authError');e.style.display=msg?'block':'none';e.textContent=msg||'';}

let isLogin=true;
function toggleAuth(){isLogin=!isLogin;authTitle.textContent=isLogin?"Login":"Signup";nameGroup.style.display=isLogin?"none":"block";showError("");}

async function signup(){
  const btn=document.getElementById("signupBtn");
  btn.classList.add("loading");
  btn.disabled=true;

  const name=document.getElementById("auth_name").value.trim();
  const email=document.getElementById("auth_email").value.trim();
  const password=document.getElementById("auth_password").value;

  if(!name||!email||!password){
    showError("All fields required");
    btn.classList.remove("loading");
    btn.disabled=false;
    return;
  }

  try{
    const res=await fetch(API+"/api/auth/register",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({name,email,password})
    });

    const data=await res.json();

    if(res.ok){
      alert("Signup success");
      toggleAuth();
    }else{
      showError(data.message||"Signup failed");
    }
  }catch(e){
    showError("Server not reachable");
  }

  btn.classList.remove("loading");
  btn.disabled=false;
}

async function login(){
  const btn=document.getElementById("loginBtn");
  btn.classList.add("loading");
  btn.disabled=true;

  const email=document.getElementById("auth_email").value.trim();
  const password=document.getElementById("auth_password").value;

  if(!email||!password){
    showError("Enter email & password");
    btn.classList.remove("loading");
    btn.disabled=false;
    return;
  }

  try{
    const res=await fetch(API+"/api/auth/login",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({email,password})
    });

    const data=await res.json();

    if(data.token){
      localStorage.setItem("token",data.token);
      localStorage.setItem("userName",data.user?.name || email);
      startApp();
    }else{
      showError(data.message||"Invalid credentials");
    }

  }catch(e){
    showError("Server not reachable");
  }

  btn.classList.remove("loading");
  btn.disabled=false;
}

function getUser(){try{return JSON.parse(atob(localStorage.getItem("token").split('.')[1]));}catch{return null;}}
function startApp(){
  authBox.style.display="none";
  app.style.display="block";
  const u=getUser();
  console.log("Token user data:",u);
  
  // Try multiple sources for name
  let fullName = localStorage.getItem("userName") || u?.name || u?.email || u?.sub || email.value || "User";
  
  // Also try to fetch from user profile endpoint
  if(fullName === "User" || !fullName){
    fetch(API+"/api/users/profile",{headers:{Authorization:"Bearer "+localStorage.getItem("token")}})
      .then(r=>r.json())
      .then(d=>{
        console.log("Profile response:",d);
        const name = d.user?.name || d.name || d.email || fullName;
        localStorage.setItem("userName",name);
        userLabel.textContent="👤 "+name;
        userLabel.title=name;
      })
      .catch(e=>console.log("Profile fetch error:",e));
  }
  
  userLabel.textContent="👤 "+fullName;
  userLabel.title=fullName;
  loadJobs();
}
function showLoader(){jobs.innerHTML='<div style="text-align:center;padding:20px"><div class="loader"></div><p style="margin-top:10px;color:var(--muted)">Loading...</p></div>';}
function logout(){localStorage.removeItem("token");location.reload();}

/* DATA */
async function api(path){
  try{
    const token=localStorage.getItem("token");
    const r=await fetch(API+path,{headers:{Authorization:"Bearer "+token}});
    const data=await r.json();
    if(!r.ok){
      console.error("API Error:",r.status,data);
      alert("Error: "+((data.message||data.error)||"Failed to fetch"));
      return {data:[]};
    }
    return data;
  }catch(e){
    console.error("Network Error:",e);
    alert("Network error: "+e.message);
    return {data:[]};
  }
}

let followToday=false;
function toggleFollowupToday(){followToday=!followToday;loadJobs();}
function toggleFollowupTodayBtn(){
  followToday=!followToday;
  const btn=document.getElementById('todayBtn');
  if(followToday){
    btn.textContent='📅 Today (ON)';
    btn.style.background='linear-gradient(135deg, #10b981 0%, #059669 100%)';
    btn.style.boxShadow='0 2px 8px rgba(16,185,129,0.2)';
  }else{
    btn.textContent='📅 Today (OFF)';
    btn.style.background='linear-gradient(135deg, #f59e0b 0%, #d97706 100%)';
    btn.style.boxShadow='0 2px 8px rgba(245,158,11,0.2)';
  }
  loadJobs();
}
function toggleAdd(){addBox.style.display=addBox.style.display==="none"?"block":"none";}

async function createJob(){
  const btn = document.getElementById('addBtn');
  btn.classList.add('loading');
  btn.disabled = true;
  const salaryRaw = c_salary.value.trim();
  const salaryNum = Number(salaryRaw) || null;
  const body = {company:c_company.value,role:c_role.value,location:c_location.value,status:c_status.value,followupDate:c_follow.value||null};
  // include multiple variants to maximize backend compatibility
  body.salary = salaryRaw || null;
  if(salaryNum) body.salaryNumber = salaryNum;
  body.joburl = c_joburl.value || null;
  body.jobUrl = c_joburl.value || null;
  body.job_url = c_joburl.value || null;

  const res = await fetch(API+"/api/applications",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+localStorage.getItem("token")},body:JSON.stringify(body)});
  let created = null;
  try{const j = await res.json(); created = j.data || j.application || j; }catch(e){}
  toggleAdd();
  // clear inputs
  c_company.value='';c_role.value='';c_location.value='';c_salary.value='';c_joburl.value='';c_status.value='Applied';c_follow.value='';
  btn.classList.remove('loading');
  btn.disabled = false;
  // if backend returned the saved object, reload from server to get authoritative list
  if(created && created._id) return loadJobs();
  // otherwise, optimistically render the new job locally so user sees their values
  const tempJob = { _id: 'tmp_'+Date.now(), company: body.company, role: body.role, location: body.location, salary: body.salary, joburl: body.joburl, status: body.status, followupDate: body.followupDate };
  renderJob(tempJob);
}

async function loadJobs(){
  try{
    showLoader();
    console.log("Fetching jobs from:",API+"/api/applications");
    const res=await api(`/api/applications?search=${encodeURIComponent(searchText.value)}&status=${filter.value}`);
    console.log("Jobs response:",res);
    let data=res.data||res||[];
    if(!Array.isArray(data)){data=[];}
    if(followToday){const t=new Date();t.setHours(0,0,0,0);data=data.filter(j=>j.followupDate&&new Date(j.followupDate).setHours(0,0,0,0)===t.getTime());}
    jobs.innerHTML="";
    if(data.length===0){jobs.innerHTML='<div style="padding:20px;text-align:center;color:var(--muted)">No jobs found</div>';return;}
    allJobs=data;
    data.forEach(renderJob);
  }catch(e){console.error("Load jobs error:",e);jobs.innerHTML='<div style="padding:20px;text-align:center;color:#ef4444">Error: '+e.message+'</div>';}
}

function renderJob(j){
  const d=j.followupDate?new Date(j.followupDate).toLocaleDateString():"-";
  const salaryText = j.salary || j.salaryNumber || j.salaryText || j.salaryRange || "-";
  const locationText = j.location || j.loc || j.city || "-";
  const link = j.joburl || j.jobUrl || j.job_url || null;
  const jobLink = link?`<a href="${link}" target="_blank" style="color:#60a5fa;text-decoration:none">🔗</a>`:"";
  const statusClass = `status-${j.status.toLowerCase().replace(/\s+/g, '-')}`;
  jobs.insertAdjacentHTML("beforeend",`
    <div class="card">
      <div class="col-company">${j.company||"-"}</div>
      <div class="col-role">${j.role||"-"}</div>
      <div class="col-location">${locationText}</div>
      <div class="col-salary">${salaryText}</div>
      <div class="col-status">
        <select class="${statusClass}"
 onchange="updateStatus('${j._id}', this.value)">

<option value="Applied" ${j.status==="Applied"?"selected":""}>📝 Applied</option>
<option value="Phone Screen" ${j.status==="Phone Screen"?"selected":""}>📞 Phone Screen</option>
<option value="Interview Scheduled" ${j.status==="Interview Scheduled"?"selected":""}>📅 Interview Scheduled</option>
<option value="Interviewed" ${j.status==="Interviewed"?"selected":""}>👥 Interviewed</option>
<option value="Technical Test" ${j.status==="Technical Test"?"selected":""}>💻 Technical Test</option>
<option value="Offer Received" ${j.status==="Offer Received"?"selected":""}>📬 Offer Received</option>
<option value="Offer Accepted" ${j.status==="Offer Accepted"?"selected":""}>✅ Offer Accepted</option>
<option value="Rejected" ${j.status==="Rejected"?"selected":""}>❌ Rejected</option>
<option value="Withdrawn" ${j.status==="Withdrawn"?"selected":""}>🚪 Withdrawn</option>

</select>
      </div>
      <div class="col-date" style="cursor:pointer;user-select:none" data-job-id="${j._id}" data-follow-date="${j.followupDate||''}" onclick="quickEditDate(this)" title="Click to change follow-up date">${d}</div>
      <div class="col-actions"><button onclick="editJob('${j._id}')">Edit</button><button onclick="deleteJob('${j._id}')">Delete</button>${jobLink}</div>
    </div>`);
}

async function updateStatus(id, newStatus){
  try{

    // 1️⃣ Get full document
    const getRes = await fetch(API+"/api/applications/"+id,{
      headers:{
        "Authorization":"Bearer "+localStorage.getItem("token")
      }
    });

    const full = await getRes.json();
    const job = full.application || full.data || full;

    if(!job){
      alert("Failed to load application");
      return;
    }

    // 2️⃣ Delete old application
    await fetch(API+"/api/applications/"+id,{
      method:"DELETE",
      headers:{
        "Authorization":"Bearer "+localStorage.getItem("token")
      }
    });

    // 3️⃣ Create new application with updated status
    const body = {
      company: job.company,
      role: job.role,
      location: job.location,
      salary: job.salary,
      jobUrl: job.jobUrl,
      followupDate: job.followupDate,
      notes: job.notes,
      status: newStatus
    };

    await fetch(API+"/api/applications",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+localStorage.getItem("token")
      },
      body: JSON.stringify(body)
    });


  }catch(e){
    console.error(e);
    alert("Failed to update application");
  }
}

  
async function quickEditDate(element){
  const jobId = element.getAttribute('data-job-id');
  const currentDate = element.getAttribute('data-follow-date');
  
  console.log('Opening date picker for job:', jobId, 'current date:', currentDate);
  
  // Get position of clicked element
  const rect = element.getBoundingClientRect();
  
  const input = document.createElement('input');
  input.type = 'date';
  input.value = currentDate || '';
  input.style.position = 'fixed';
  input.style.left = (rect.left) + 'px';
  input.style.top = (rect.bottom + 5) + 'px';
  input.style.width = '180px';
  input.style.height = '36px';
  input.style.padding = '6px 8px';
  input.style.fontSize = '13px';
  input.style.zIndex = '10000';
  input.style.border = '2px solid #6366f1';
  input.style.borderRadius = '8px';
  input.style.background = 'rgba(17,24,53,0.95)';
  input.style.color = '#fff';
  input.autoFocus = true;
  
  document.body.appendChild(input);
  
  // Open picker with delay
  setTimeout(() => {
    input.focus();
    if(input.showPicker) {
      input.showPicker();
    } else {
      input.click();
    }
  }, 100);
  
  const cleanup = () => {
    if(document.body.contains(input)){
      document.body.removeChild(input);
    }
  };
  
  input.addEventListener('change', async function(){
    console.log('Date changed to:', input.value);
    if(input.value){
      try{
        const res = await fetch(API + "/api/applications/" + jobId, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + localStorage.getItem("token")
          },
          body: JSON.stringify({followupDate: input.value})
        });
        console.log('Response status:', res.status);
        if(res.ok){
          loadJobs();
        } else {
          alert('Failed to update follow-up date');
        }
      } catch(e){
        console.error('Error updating date:', e);
        alert('Error: ' + e.message);
      }
    }
    cleanup();
  });
  
  input.addEventListener('blur', cleanup);
  input.addEventListener('cancel', cleanup);
}

let editingJobId=null;
let allJobs=[];

async function editJob(id){
  editingJobId=id;
  // Try to find job in already loaded jobs
  let j=allJobs.find(job=>job._id===id);
  
  // If not found, try to fetch it
  if(!j){
    try{
      const res=await api(`/api/applications/${id}`);
      j=res.data||res;
    }catch(e){
      console.error("Failed to fetch job:",e);
      alert("Failed to load job details");
      return;
    }
  }
  
  if(!j){
    alert("Job not found");
    return;
  }
  
  console.log("Edit job:",j);
  // Pre-fill the form with current values
  e_company.value=j.company||"";
  e_role.value=j.role||"";
  e_location.value=j.location||j.loc||j.city||"";
  e_salary.value=j.salary||j.salaryNumber||"";
  e_joburl.value=j.joburl||j.jobUrl||j.job_url||"";
  e_status.value=j.status||"Applied";
  editBox.style.display="block";
  // Scroll to edit form
  editBox.scrollIntoView({behavior:"smooth"});
}

async function saveEdit(){
  if(!editingJobId)return;
  const btn = document.getElementById('editBtn');
  btn.classList.add('loading');
  btn.disabled = true;
  const body={company:e_company.value,role:e_role.value,location:e_location.value,salary:e_salary.value||null,status:e_status.value};
  body.joburl=e_joburl.value||null;
  body.jobUrl=e_joburl.value||null;
  body.job_url=e_joburl.value||null;
  const res=await fetch(API+"/api/applications/"+editingJobId,{method:"PUT",headers:{"Content-Type":"application/json","Authorization":"Bearer "+localStorage.getItem("token")},body:JSON.stringify(body)});
  btn.classList.remove('loading');
  btn.disabled = false;
  if(res.ok){editBox.style.display="none";editingJobId=null;loadJobs();}else alert("Update failed");
}

function cancelEdit(){
  editBox.style.display="none";
  editingJobId=null;
}

async function deleteJob(id){
  if(!confirm("Delete?"))return;
  await fetch(API+"/api/applications/"+id,{method:"DELETE",headers:{Authorization:"Bearer "+localStorage.getItem("token")}});
  loadJobs();
}

if(localStorage.getItem("token"))startApp();
